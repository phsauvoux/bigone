name: Build Windows VST3

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel 2

      - name: Package VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item -Recurse "build\PhSynthOne_artefacts\Release\VST3\PhSynth One.vst3" artifact\

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhSynth-One-Windows-VST3
          path: artifact/PhSynth One.vst3
