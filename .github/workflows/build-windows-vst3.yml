name: Build Windows VST3

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Clean old build folder
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force build-win -ErrorAction SilentlyContinue

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel 2

      - name: Package VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          $vst3 = Get-ChildItem -Path build -Recurse -Directory -Filter "*.vst3" | Select-Object -First 1
          if (-not $vst3) { throw "No VST3 found" }
          Copy-Item $vst3.FullName artifact -Recurse -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhSynth-One-Windows-VST3
          path: artifact